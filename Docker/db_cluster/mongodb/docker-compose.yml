services:
  mongo_primary:
    image: mongo
    container_name: mongo_primary_c
    restart: always
    volumes:
      - ./primary/data:/data/db
    command:  mongod --port 27017 --replSet rs0 --bind_ip 0.0.0.0
    networks:
      - mongo_cluster
  mongo_s1:
    image: mongo
    container_name: mongo_s1_c
    restart: always
    volumes:
      - ./s1/data:/data/db
    command:  mongod --port 27017 --replSet rs0 --bind_ip 0.0.0.0
    networks:
      - mongo_cluster
  mongo_s2:
    image: mongo
    container_name: mongo_s2_c
    restart: always
    volumes:
      - ./s2/data:/data/db
    command:  mongod --port 27017 --replSet rs0 --bind_ip 0.0.0.0
    networks:
      - mongo_cluster
