spring:
  application:
    name: spring-boot-jenkins-demo
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://postgres:5432/demo_db
    username: demo_user
    password: demo_password
    driver-class-name: org.postgresql.Driver

server:
  port: 8080
  servlet:
    context-path: /
