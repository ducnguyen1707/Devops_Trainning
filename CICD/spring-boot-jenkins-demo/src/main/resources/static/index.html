<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CICD Demo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #f5f5dc, #efe6c9);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.6);
      padding: 50px 80px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 42px;
      color: #2c2c2c;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    p {
      font-size: 20px;
      color: #555;
      margin: 10px 0;
    }

    .director {
      margin-top: 30px;
      font-size: 18px;
      font-style: italic;
      color: #777;
    }

    .gold-line {
      width: 60px;
      height: 3px;
      background: linear-gradient(to right, #c6a95b, #e6d28f);
      margin: 20px auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SPRING BOOT</h1>
    <div class="gold-line"></div>
    <p>for CICD Demo</p>
    <div class="director">Director: Duc Nguyen</div>
  </div>
</body>
</html>
